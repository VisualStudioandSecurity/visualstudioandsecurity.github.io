<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Studio Games | Guilherme Silva</title>
    
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --accent: #58a6ff; 
            --green: #238636; --gray: #8b949e; --neon: #00f2ff;
        }

        body {
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); color: white;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            text-align: center; min-height: 100vh;
            
            /* CAMADA 1: Bloqueio visual de seleção */
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .container { width: 92%; max-width: 1000px; margin: 30px auto; }

        h1 {
            font-size: 2.2rem; text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon); color: white;
            margin-bottom: 5px;
        }

        .section-title { 
            color: var(--neon); font-size: 1.1rem; margin: 40px 0 20px; 
            text-transform: uppercase; border-bottom: 1px solid #30363d; 
            display: inline-block; padding-bottom: 5px; 
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; width: 100%; margin-top: 20px;
        }

        .game-link { text-decoration: none; color: inherit; display: block; }
        
        .game-card {
            background: var(--card); border-radius: 12px; border: 1px solid #30363d;
            overflow: hidden; transition: 0.3s; text-align: left;
        }

        .game-link:hover .game-card { transform: translateY(-5px); border-color: var(--neon); }
        .game-card img { width: 100%; height: 160px; object-fit: cover; background: #000; }
        .card-content { padding: 15px; }
        .card-content h3 { margin: 5px 0; color: var(--neon); font-size: 1.1rem; }
        .card-content p { color: var(--gray); font-size: 0.85rem; }

        .btn-group { margin: 25px 0; display: flex; justify-content: center; gap: 10px; }
        .btn {
            padding: 12px 20px; border-radius: 6px; font-weight: bold;
            text-decoration: none; color: white; border: none; cursor: pointer;
        }
        .btn-github { background: var(--green); }
        .btn-pix { background: #32bcad; color: #0d1117; }

        footer { width: 100%; padding: 20px 0; border-top: 1px solid #30363d; background: #090c10; margin-top: auto; }
        .apache-footer { margin-top: 20px; font-size: 14px; color: #888; }
        .apache-footer a { color: var(--neon); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Visual Studio Games</h1>
        <p style="color: var(--gray); font-weight: bold;">Senior Developer & Cyber Security</p>

        <div class="btn-group">
            <a href="https://github.com/VisualStudioAndSecurity" class="btn btn-github" target="_blank">GitHub</a>
            <button onclick="copyPix()" class="btn btn-pix">Apoiar PIX</button>
        </div>

        <div class="section-title">[02] Jogos</div>
        <div class="gallery">
            <a href="graffiti-canvas/" class="game-link">
                <div class="game-card">
                    <img src="thumb_graffiti.jpg" onerror="this.src='https://via.placeholder.com/300x160/161b22/ef4444?text=Graffiti+Canvas'">
                    <div class="card-content">
                        <div style="display: flex; justify-content: space-between;">
                            <h3>Graffiti Canvas</h3>
                            <span style="background: #ef4444; padding: 2px 6px; border-radius: 4px; font-size: 10px;">NEW</span>
                        </div>
                        <p>Pixe o mural, gerencie sua tinta e salve sua arte.</p>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <footer>
        <div style="color: var(--neon); font-family: monospace; margin-bottom: 10px;">[SYSTEM_LOG]: ONLINE</div>
        
        <div class="apache-footer">
            <p>&copy; 2026 <strong>Visual Studio Games</strong>. Todos os direitos reservados.</p>
            <p>Distribuído sob a <a href="LICENSE">Apache License 2.0</a>.</p>
            <p style="font-size: 10px; opacity: 0.5;">Desenvolvido por Kovaliosky DeV</p>
        </div>
    </footer>

    <script>
        // --- CAMADA 2: Bloqueio de Context Menu (Botão Direito) ---
        document.addEventListener('contextmenu', event => event.preventDefault());

        // --- CAMADA 3: Bloqueio de Teclas de Inspeção (F12, Ctrl+Shift+I, Ctrl+U) ---
        document.onkeydown = function(e) {
            // F12
            if(e.keyCode == 123) return false;
            // Ctrl+Shift+I (Inspecionar)
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            // Ctrl+Shift+J (Console)
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            // Ctrl+U (Ver Código Fonte)
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        }

        function copyPix() {
            navigator.clipboard.writeText("10267545266").then(() => alert("PIX Copiado!"));
        }
    </script>
</body>
</html>
