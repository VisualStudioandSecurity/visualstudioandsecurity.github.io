<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Studio Games | Guilherme Silva</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4389870681468404" crossorigin="anonymous"></script>

    <style>
        :root { 
            --bg: #0d1117; 
            --card: #161b22; 
            --accent: #58a6ff; 
            --green: #238636; 
            --gray: #8b949e; 
            --neon: #00f2ff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: white;
            padding: 50px 20px;
            margin: 0;
            text-align: center; /* Centralização global por padrão */
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #30363d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        h1 { color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        h2 { color: var(--neon); font-size: 1.2rem; margin-top: 30px; margin-bottom: 15px; }
        
        /* Centralizando o parágrafo de Sobre Mim */
        p { color: var(--gray); font-size: 1em; line-height: 1.6; max-width: 600px; margin: 0 auto 15px auto; }

        .btn-group { margin: 25px 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }

        .btn {
            display: inline-block; padding: 12px 24px; color: white; text-decoration: none;
            border-radius: 6px; font-weight: bold; transition: 0.3s;
            cursor: pointer; border: none;
        }

        .btn-github { background-color: var(--green); }
        .btn-github:hover { background-color: #2ea043; }
        .btn-pix { background-color: #32bcad; color: #0d1117; }
        .btn-pix:hover { background-color: #45d6c6; }

        .ads-container {
            margin: 25px 0; padding: 15px; background: #21262d;
            border-radius: 8px; border: 1px dashed #484f58; min-height: 100px;
        }

        .section-box {
            margin-top: 40px; padding: 20px;
            border-top: 1px solid #30363d;
            /* Removemos text-align: left daqui */
        }

        footer { margin-top: 60px; padding: 40px 20px; border-top: 1px solid #30363d; }
        
        .system-log { 
            margin-bottom: 20px; padding: 15px; background: #000;
            border: 1px solid var(--neon); display: inline-block;
            border-radius: 5px; font-family: monospace; font-size: 0.9rem;
        }
    </style>
</head>
