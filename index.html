<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kovaliosky | Visual Studio Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        body { 
            background: #050505; 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* TELAS */
        #screen-login { display: flex; flex-direction: column; align-items: center; z-index: 10; }
        #screen-hub { 
            display: none; 
            width: 100%; 
            height: 100%; 
            flex-direction: column; 
            padding: 40px; 
            box-sizing: border-box; 
            overflow-y: auto; 
            background: #080808;
        }

        /* LOGIN */
        .login-card {
            background: #111;
            border: 1px solid #333;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 340px;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.1);
        }

        h1 { color: #39FF14; font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #39FF14; border-radius: 4px; outline: none; }

        .btn-main {
            width: 100%; padding: 15px; background: #39FF14; color: black; border: none;
            font-family: 'Orbitron'; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .btn-main:hover { box-shadow: 0 0 20px #39FF14; transform: scale(1.02); }

        /* HUB GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        .card {
            background: #151515;
            border: 1px solid #222;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            transition: 0.3s;
        }
        .card:hover { border-color: #39FF14; background: #1a1a1a; }

        .preview { height: 120px; border-radius: 6px; margin-bottom: 15px; }

        .btn-play {
            background: transparent; border: 1px solid #39FF14; color: #39FF14;
            padding: 10px; width: 100%; cursor: pointer; font-family: 'Orbitron';
            font-size: 0.8rem; transition: 0.3s;
        }
        .btn-play:hover { background: #39FF14; color: black; }
    </style>
</head>
<body>

    <div id="screen-login">
        <div class="login-card">
            <h1>VISUAL STUDIO GAMES</h1>
            <input type="text" placeholder="ACCESS_ID">
            <input type="password" placeholder="PASSWORD">
