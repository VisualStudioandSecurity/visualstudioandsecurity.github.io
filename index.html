<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Studio Games | Hub</title>
    <style>
        /* CONFIGURAÇÕES GERAIS */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #050505;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        section {
            display: none;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            position: absolute;
            transition: opacity 0.5s ease;
        }

        section.active { display: flex !important; opacity: 1; }

        /* TELA DE LOGIN */
        .main-container { display: flex; align-items: center; gap: 30px; }
        .side-menu { display: flex; flex-direction: column; gap: 15px; }
        .side-btn {
            width: 200px; padding: 12px; border: none; border-radius: 4px;
            color: white; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer;
        }
        .register { background: #8b5a41; }
        .wax { background: #4e4494; }
        .telos { background: #3b3175; }

        .login-box {
            background: rgba(20, 20, 20, 0.9);
            padding: 40px; width: 380px; border-radius: 10px;
            border: 1px solid #333; text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .neon-logo-main { color: #39FF14; font-family: 'Orbitron'; font-size: 1.2rem; margin-bottom: 20px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { font-size: 0.7rem; color: #888; display: block; margin-bottom: 5px; }
        .input-group input {
            width: 100%; background: #000; border: 1px solid #444; padding: 12px; color: white;
        }

        .login-btn {
            width: 100%; background: #39FF14; color: black; padding: 15px;
            border: none; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
            margin-top: 10px; transition: 0.3s;
        }
        .login-btn:hover { box-shadow: 0 0 20px #39FF14; }
