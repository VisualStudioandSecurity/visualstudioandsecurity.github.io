<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Studio Games | Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="screen-entry" class="active">
        <div class="main-container">
            
            <div class="side-menu">
                <button class="side-btn register">REGISTER</button>
                <button class="side-btn wax">WAX DROPS</button>
                <button class="side-btn telos">TELOS DROPS</button>
            </div>

            <div class="login-box">
                <div class="brand-header">
                    <h1 class="neon-logo-main">VISUAL STUDIO GAMES</h1>
                </div>
                <h2 class="login-title">LOGIN</h2>
                
                <div class="input-group">
                    <label>EMAIL ADDRESS</label>
                    <input type="email" placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label>PASSWORD</label>
                    <input type="password" placeholder="Enter your password">
                </div>

                <button id="btn-start" class="login-btn">LOGIN</button>
            </div>
        </div>
    </section>

    <section id="screen-hub">
        <nav class="gameverse-nav">
            <div class="nav-logo">VISUAL STUDIO GAMES</div>
            <ul class="nav-links">
                <li>MY GAMES</li>
                <li>TRADING BOTS</li>
                <li>DATABASE</li>
                <li>SETTINGS</li>
            </ul>
            <button class="btn-play-highlight">LOGOUT</button>
        </nav>

        <div class="hub-container">
            <header class="hub-header">
                <span class="tagline">DEVELOPER PORTFOLIO</span>
                <h1 class="hub-main-title">PROJECTS DRIVE</h1>
            </header>

            <div class="games-grid">
                
                <div class="game-card">
                    <div class="game-img" style="background: linear-gradient(45deg, #1a1a1a, #39FF14);">
                        <span class="game-icon">🐍</span>
                    </div>
                    <div class="game-info">
                        <h3>SNAKE NEON</h3>
                        <p>Classic arcade style</p>
                        <button class="play-small" onclick="window.location.href='snake.html'">LAUNCH</button>
                    </div>
                </div>

                <div class="game-card">
                    <div class="game-img" style="background: linear-gradient(45deg, #1a1a1a, #d4008d);">
                        <span class="game-icon">🏎️</span>
                    </div>
                    <div class="game-info">
                        <h3>DRIFT KING</h3>
                        <p>Modified cars simulator</p>
                        <button class="play-small">LAUNCH</button>
                    </div>
                </div>

                <div class="game-card">
                    <div class="game-img" style="background: linear-gradient(45deg, #1a1a1a, #00d4ff);">
                        <span class="game-icon">📉</span>
                    </div>
                    <div class="game-info">
                        <h3>TRADER SIM</h3>
                        <p>Market strategy game</p>
                        <button class="play-small">LAUNCH</button>
                    </div>
                </div>

                <div class="game-card">
                    <div class="game-img" style="background: linear-gradient(45deg, #1a1a1a, #ff9900);">
                        <span class="game-icon">🎭</span>
                    </div>
                    <div class="game-info">
                        <h3>MEME PLATFORM</h3>
                        <p>Funny 2D Adventure</p>
