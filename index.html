<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Studio Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        /* BASE DO SITE */
        body { 
            background: #000 !important; 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
        }

        /* TELA 1: LOGIN */
        #login-page { 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        
        .box { 
            background: #0a0a0a; 
            padding: 40px; 
            border: 1px solid #1a1a1a; 
            border-radius: 10px; 
            width: 300px; 
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.1);
        }
        
        h1 { color: #39FF14; font-size: 1.1rem; margin-bottom: 25px; letter-spacing: 1px; }
        
        input { 
            width: 100%; padding: 12px; margin: 8px 0; 
            background: #000; border: 1px solid #333; color: #39FF14; 
            border-radius: 5px; box-sizing: border-box; outline: none;
        }

        .btn-enter { 
            width: 100%; padding: 15px; background: #39FF14; 
            color: #000; border: none; font-weight: bold; 
            cursor: pointer; margin-top: 10px; font-family: 'Orbitron';
            transition: 0.3s;
        }
        .btn-enter:hover { box-shadow: 0 0 15px #39FF14; }

            padding: 20px;
