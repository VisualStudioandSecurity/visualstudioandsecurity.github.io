<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kv's Enterprise | Visual Studio Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
        }

        .neon-glow {
            text-shadow: 0 0 10px #00ff00;
        }

        .border-neon {
            border: 1px solid #00ff00;
            box-shadow: 0 0 15px rgba(0,255,0,0.2);
        }
    </style>
</head>
<body class="p-6">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-center text-4xl font-black neon-glow mb-10 tracking-widest">VANGUARD_CORE_HUB</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="border-neon p-6 rounded-xl bg-black">
                <h2 class="text-[#00ff00] font-bold mb-4 uppercase tracking-tighter">Security_Shield</h2>
                <div class="bg-[#00ff00]/5 p-6 border border-[#00ff00]/20 rounded">
                    <p class="text-[10px] text-gray-500 uppercase mb-2">Live BTC/USDT</p>
                    <span id="btc-price" class="text-3xl font-bold text-[#00ff00]">SYNCING...</span>
                </div>
                <div class="mt-6 text-[10px] text-gray-500 italic uppercase">
                    Lead: Guilherme Kovaliosky // Senior Dev
                </div>
            </div>

            <div class="border-neon p-6 rounded-xl bg-black">
                <h2 class="font-bold mb-4 uppercase tracking-tighter">Active_Solutions_v1</h2>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="p-3 border border-[#00ff00]/40 text-[#00ff00] text-center text-[10px] font-bold uppercase">
                        Repos: <span id="repo-count">0</span>
                    </div>
                    <a href="https://kventerprise.github.io/short-sniper/" target="_blank" class="p-3 border border-white/20 text-center text-[10px] hover:border-[#00ff00] transition-all uppercase">Short_Sniper</a>
                </div>
                <a href="https://github.com/kventerprise" target="_blank" class="block w-full text-center bg-[#00ff00] text-black font-black py-4 text-xs tracking-widest hover:shadow-[0_0_20px_#00ff00] transition-all">ABRIR GITHUB_</a>
            </div>
        </div>
    </div>

    <script>
        // Preço do Bitcoin
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            document.getElementById('btc-price').innerText = '$' + parseFloat(data.c).toLocaleString();
        };

        // Contador de Repos do seu GitHub
        async function loadGit() {
            try {
                const res = await fetch('https://api.github.com/users/kventerprise');
                const data = await res.json();
                document.getElementById('repo-count').innerText = data.public_repos || '0';
            } catch (e) { document.getElementById('repo-count').innerText = 'ERR'; }
        }
        loadGit();
    </script>
</body>
</html>
