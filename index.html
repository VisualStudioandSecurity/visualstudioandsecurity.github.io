<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Studio Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Orbitron', sans-serif; 
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ANIMAÇÃO DE COR (CHROMA) */
        @keyframes chroma {
            0% { color: #39FF14; text-shadow: 0 0 10px #39FF14; }
            33% { color: #d4008d; text-shadow: 0 0 10px #d4008d; }
            66% { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }
            100% { color: #39FF14; text-shadow: 0 0 10px #39FF14; }
        }

        .chroma-text {
            animation: chroma 5s infinite linear;
            font-weight: bold;
        }

        /* TELA DE LOGIN */
        #login-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .login-box {
            background: #0a0a0a;
            padding: 40px;
            border: 1px solid #222;
            border-radius: 12px;
            text-align: center;
            width: 320px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.1rem; margin-bottom: 25px; letter-spacing: 2px; }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            outline: none;
            font-family: 'Orbitron';
            font-size: 0.8rem;
        }

        .btn-enter {
            width: 100%;
            padding: 15px;
            background: #fff;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Orbitron';
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-enter:hover { transform: scale(1.05); background: #39FF14; }

        /* TELA DO HUB */
        #hub-page {
            display: none;
            width: 90%;
            max-width: 1100px;
            flex-direction: column;
            height: 90vh;
        }

        .header {
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
