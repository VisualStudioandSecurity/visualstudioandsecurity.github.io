    <script>
        // SCRIPT BITCOIN - WebSocket Binance
        function startBTC() {
            const btcDisplay = document.getElementById('btc-price');
            const btcWs = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');

            btcWs.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.c) {
                    btcDisplay.innerText = '$' + parseFloat(data.c).toLocaleString(undefined, { minimumFractionDigits: 2 });
                }
            };

            btcWs.onerror = () => { btcDisplay.innerText = "ERRO_CONEXÃO"; };
        }

        // SCRIPT GITHUB
        async function fetchGithub() {
            try {
                const res = await fetch('https://api.github.com/users/VisualStudioandSecurity');
                const data = await res.json();
                document.getElementById('repo-count').innerText = data.public_repos || '0';
            } catch (err) {
                document.getElementById('repo-count').innerText = 'OFF';
            }
        }

        // INICIALIZAÇÃO
        window.onload = () => {
            startBTC();
            fetchGithub();
        };
    </script>
